<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description><dc:creator>RealFaviconGenerator</dc:creator><dc:source>https://realfavicongenerator.net</dc:source></rdf:Description></rdf:RDF></metadata><title>Fresko</title><rect width="512" height="512" rx="112" fill="#ab5637"></rect><g transform="translate(256 256) rotate(-30)">
    <!-- Leaf body: bezier-built lanceolate shape, tip up, base down -->
    <path d="M 0 -180
             C 70 -150, 120 -80, 110 0
             C 100 80, 60 150, 0 180
             C -60 150, -100 80, -110 0
             C -120 -80, -70 -150, 0 -180 Z" fill="#faf8f5"></path>
    <!-- Curved central vein (midrib), follows the leaf's natural arc -->
    <path d="M 0 -170 Q 6 0, 0 170" stroke="#519160" stroke-width="9" stroke-linecap="round" fill="none"></path>
    <!-- Side veins: curve outward from midrib toward the leaf edge.
         Right side (relative) -->
    <path d="M 2 -120 Q 35 -110, 75 -75" stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"></path>
    <path d="M 4 -55 Q 45 -45, 95 -10" stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"></path>
    <path d="M 5 15 Q 45 25, 88 60" stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"></path>
    <path d="M 3 85 Q 35 95, 65 120" stroke="#519160" stroke-width="5" stroke-linecap="round" fill="none"></path>
    <!-- Left side (slightly offset, asymmetric — leaves are never perfectly mirrored) -->
    <path d="M -2 -100 Q -40 -95, -78 -60" stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"></path>
    <path d="M -4 -35 Q -45 -25, -92 8" stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"></path>
    <path d="M -5 35 Q -45 45, -85 75" stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"></path>
    <path d="M -3 100 Q -32 110, -58 132" stroke="#519160" stroke-width="5" stroke-linecap="round" fill="none"></path>
  </g></svg>