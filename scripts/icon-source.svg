<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Fresko</title>
  <rect width="512" height="512" rx="112" fill="#ab5637"/>
  <!--
    Leaf: pointed tip top-right, pointed base bottom-left.
    Built around a curved midrib so the silhouette swells asymmetrically,
    the way a real leaf does, rather than as a symmetric ellipse.
  -->
  <g transform="translate(256 256) rotate(-30)">
    <!-- Leaf body: bezier-built lanceolate shape, tip up, base down -->
    <path d="M 0 -180
             C 70 -150, 120 -80, 110 0
             C 100 80, 60 150, 0 180
             C -60 150, -100 80, -110 0
             C -120 -80, -70 -150, 0 -180 Z"
          fill="#faf8f5"/>
    <!-- Curved central vein (midrib), follows the leaf's natural arc -->
    <path d="M 0 -170 Q 6 0, 0 170"
          stroke="#519160" stroke-width="9" stroke-linecap="round" fill="none"/>
    <!-- Side veins: curve outward from midrib toward the leaf edge.
         Right side (relative) -->
    <path d="M 2 -120 Q 35 -110, 75 -75"
          stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 4 -55 Q 45 -45, 95 -10"
          stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 5 15 Q 45 25, 88 60"
          stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 3 85 Q 35 95, 65 120"
          stroke="#519160" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Left side (slightly offset, asymmetric — leaves are never perfectly mirrored) -->
    <path d="M -2 -100 Q -40 -95, -78 -60"
          stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M -4 -35 Q -45 -25, -92 8"
          stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M -5 35 Q -45 45, -85 75"
          stroke="#519160" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M -3 100 Q -32 110, -58 132"
          stroke="#519160" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
